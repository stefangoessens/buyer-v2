[mypy]
python_version = 3.13
strict_optional = True
warn_unused_ignores = True
disallow_untyped_defs = True
warn_redundant_casts = True
warn_return_any = True
no_implicit_optional = True
check_untyped_defs = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-respx.*]
ignore_missing_imports = True

[mypy-pytesseract.*]
ignore_missing_imports = True

[mypy-pdfplumber.*]
ignore_missing_imports = True

[mypy-pdf2image.*]
ignore_missing_imports = True

[mypy-langdetect.*]
ignore_missing_imports = True
