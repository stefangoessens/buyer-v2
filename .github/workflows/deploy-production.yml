name: Production Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify-deploy:
    name: Verify production deploy
    runs-on: ubuntu-latest
    # Railway deploys automatically on push to main.
    # This job waits and verifies the deploy is healthy.
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Railway deploy
        run: |
          echo "Railway deploys automatically via GitHub integration."
          echo "Waiting 120s for deploy to propagate..."
          sleep 120

      - name: Health check
        if: vars.PRODUCTION_URL != ''
        run: |
          response=$(curl -sf "${{ vars.PRODUCTION_URL }}/api/health" || echo '{"status":"unknown"}')
          echo "Health check response: $response"
          if echo "$response" | grep -q '"status":"ok"'; then
            echo "✅ Production health check passed"
          else
            echo "⚠️ Health check returned unexpected response (deploy may still be in progress)"
          fi

      - name: Post-deploy summary
        run: |
          echo "## Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Railway:** Auto-deployed via GitHub integration" >> $GITHUB_STEP_SUMMARY
          echo "- **Convex:** Requires manual \`npx convex deploy\` for schema changes" >> $GITHUB_STEP_SUMMARY
