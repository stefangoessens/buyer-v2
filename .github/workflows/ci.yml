name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck:web

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build:web
        env:
          NEXT_PUBLIC_CONVEX_URL: https://example.convex.cloud
          NEXT_PUBLIC_POSTHOG_KEY: test-posthog-key
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          NEXT_PUBLIC_SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0

  convex:
    name: Convex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Convex workspace
        run: pnpm --dir convex typecheck

  shared:
    name: Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared package
        run: pnpm --dir packages/shared typecheck

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Swift package
        run: cd ios/BuyerV2 && swift test

  python:
    name: Python (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - python-workers
          - services/extraction
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies and run tests
        run: |
          cd "${{ matrix.workspace }}"
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pytest -q
