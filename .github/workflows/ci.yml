name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck:web

      - name: Unit tests + coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build:web
        env:
          NEXT_PUBLIC_CONVEX_URL: https://example.convex.cloud
          NEXT_PUBLIC_POSTHOG_KEY: test-posthog-key
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          NEXT_PUBLIC_SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: pnpm ci:e2e

  ai-eval:
    name: AI Eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pricing eval smoke
        run: pnpm ci:eval

  convex:
    name: Convex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Convex workspace
        run: pnpm --dir convex typecheck

  shared:
    name: Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared package
        run: pnpm --dir packages/shared typecheck

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Swift package with coverage
        # `swift test` defaults to the macOS host target, but
        # `BuyerV2/Package.swift` only declares `.iOS(.v17)` as a
        # supported platform, so SwiftUI code referencing iOS-only
        # APIs fails to compile on the macOS host. Run against an
        # iOS Simulator via xcodebuild instead — matches how the
        # package is actually consumed by the app target.
        run: |
          cd ios/BuyerV2
          xcodebuild test \
            -scheme BuyerV2 \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Enforce iOS coverage threshold
        run: |
          cd ios/BuyerV2
          python - <<'PY'
          import json
          import subprocess
          import sys

          threshold = 65.0
          raw = subprocess.check_output(
              ["xcrun", "xccov", "view", "--report", "--json", "TestResults.xcresult"],
              text=True,
          )
          report = json.loads(raw)
          targets = report.get("targets", [])

          coverage = None
          for target in targets:
              if target.get("name") == "BuyerV2":
                  coverage = float(target.get("lineCoverage", 0)) * 100
                  break

          if coverage is None:
              print("::error::BuyerV2 target coverage was not present in the xccov report")
              sys.exit(1)

          print(f"BuyerV2 line coverage: {coverage:.2f}%")
          if coverage < threshold:
              print(f"::error::BuyerV2 coverage {coverage:.2f}% is below {threshold:.2f}%")
              sys.exit(1)
          PY

  python:
    name: Python (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - python-workers
          - services/extraction
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies and run tests
        run: |
          cd "${{ matrix.workspace }}"
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pytest -q
